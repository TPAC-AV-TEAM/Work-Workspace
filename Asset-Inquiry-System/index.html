<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ── Load embedded data ──────────────────────────────────────────────────────
const RAW_DATA = JSON.parse(document.getElementById('data-source').textContent);

// 擴充升級為相容標單語境：
const SHEET_LABEL = {
  'GT': '大劇院 (GT)',
  'PP': '鏡框中劇場 (PP/GP)',
  'GP': '鏡框中劇場 (PP/GP)',
  'MT': '多形式中劇場 (MT/BB)',
  'BB': '多形式中劇場 (MT/BB)',
  'Other Space': '其它空間',
  'Other': '其它空間',
  'Seating': '觀眾席座椅'
};

const TP_COLOR = {
  TP4: { bg: 'bg-blue-900/30',   text: 'text-blue-400',   ring: 'border-blue-700/40' },
  TP5: { bg: 'bg-purple-900/30', text: 'text-purple-400', ring: 'border-purple-700/40' },
};

const ORPHAN_META = {
  TP_ONLY:       { label: 'TP清單專屬',  cls: 'orphan-tp',       badge: 'bg-violet-900/30 text-violet-300' },
  CONTRACT_ONLY: { label: '標單專屬',    cls: 'orphan-contract',  badge: 'bg-emerald-900/30 text-emerald-300' },
};

// ── Utility ─────────────────────────────────────────────────────────────────
function normalizeQuery(s) {
  return s.trim()
    .replace(/．/g, '.')    // full-width dot → half-width
    .replace(/\s+/g, ' ')
    .toLowerCase();
}

function matchItem(item, q) {
  if (!q) return true;
  const hay = [item.code, item.name, item.model, item.pm_code, item.asset_no, item.features, item.location]
    .filter(Boolean).join(' ').toLowerCase();
  return hay.includes(q);
}

// ── Stats bar ───────────────────────────────────────────────────────────────
function StatsBar({ total, shown, diffCount, orphanTpCount, orphanCCount }) {
  return (
    <div className="flex flex-wrap gap-x-6 gap-y-1 text-[11px] mono text-slate-500 mb-6 px-1">
      <span>總筆數 <span className="text-slate-300 font-semibold">{total}</span></span>
      <span>顯示 <span className="text-indigo-400 font-semibold">{shown}</span></span>
      <span className="text-amber-600">數量差異 <span className="text-amber-400 font-semibold">{diffCount}</span></span>
      <span className="text-violet-500">TP清單專屬 <span className="text-violet-400 font-semibold">{orphanTpCount}</span></span>
      <span className="text-emerald-600">標單專屬 <span className="text-emerald-400 font-semibold">{orphanCCount}</span></span>
    </div>
  );
}

// ── Result card ─────────────────────────────────────────────────────────────
function ResultCard({ item }) {
  const tpStyle   = TP_COLOR[item.tp] ?? { bg:'bg-slate-800', text:'text-slate-300', ring:'' };
  const sheetLabel = SHEET_LABEL[item.sheet] ?? item.sheet;
  const orphanMeta = item.orphan ? ORPHAN_META[item.orphan] : null;

  const cardCls = [
    'bg-[#111520] border border-[#1c2235] rounded-2xl p-5',
    'card-hover transition-all duration-300',
    item.qty_diff   ? 'diff-row'     : '',
    item.orphan === 'TP_ONLY'       ? 'orphan-tp'       : '',
    item.orphan === 'CONTRACT_ONLY' ? 'orphan-contract' : '',
  ].filter(Boolean).join(' ');

  return (
    <div className={cardCls}>
      {/* ── Header badges ── */}
      <div className="flex flex-wrap gap-1.5 mb-4 items-center">
        <span className={`badge ${tpStyle.bg} ${tpStyle.text}`}>{item.tp}</span>
        <span className="badge bg-slate-800/60 text-slate-400">{sheetLabel}</span>
        {item.qty_diff && (
          <span className="badge bg-amber-900/30 text-amber-400">⚠ 數量差異</span>
        )}
        {orphanMeta && (
          <span className={`badge ${orphanMeta.badge}`}>{orphanMeta.label}</span>
        )}
        <span className="ml-auto mono text-xs text-slate-600 tracking-wider">{item.code}</span>
      </div>

      {/* ── Main info grid ── */}
      <div className="grid grid-cols-[96px_1fr] gap-x-3 gap-y-2.5 text-sm mb-4">
        <span className="grid-label pt-0.5">名稱</span>
        <span className="text-white font-bold leading-snug">{item.name || '—'}</span>

        <span className="grid-label pt-0.5">數量</span>
        <span className="flex flex-wrap gap-2 items-center">
          {item.qty_tp != null ? (
            <span className="mono text-amber-400 font-semibold">{item.qty_tp} {item.unit !== '—' ? item.unit : ''}</span>
          ) : (
            <span className="text-slate-600">—</span>
          )}
          {item.qty_diff && item.qty_contract != null && (
            <span className="mono text-xs text-amber-600 bg-amber-900/20 px-2 py-0.5 rounded">
              標單: {item.qty_contract}
            </span>
          )}
          {!item.qty_diff && item.qty_contract != null && item.qty_tp == null && (
            <span className="mono text-emerald-400 font-semibold">{item.qty_contract} {item.unit !== '—' ? item.unit : ''}</span>
          )}
        </span>

        <span className="grid-label pt-0.5">型號</span>
        <span className="mono text-indigo-400 text-xs break-all leading-relaxed">{item.model || '—'}</span>
      </div>

      {/* ── Divider ── */}
      <div className="border-t border-[#1c2235] my-3" />

      {/* ── Contract enrichment fields ── */}
      <div className="grid grid-cols-[96px_1fr] gap-x-3 gap-y-2 text-xs">
        <span className="grid-label pt-0.5">PM代號</span>
        <span className="mono text-cyan-500">{item.pm_code || '—'}</span>

        <span className="grid-label pt-0.5">財產編號</span>
        <span className="mono text-cyan-600">{item.asset_no || '—'}</span>

        <span className="grid-label pt-0.5">特徵及說明</span>
        <span className="text-slate-300 leading-relaxed">{item.features || '—'}</span>
      </div>

      {/* ── Location comparison block ── */}
      {(() => {
        const isLocDiff = item.inventory_loc && item.location !== item.inventory_loc;
        return (
          <div className="bg-[#0b0e17] p-3 rounded-lg border border-slate-800/50 mt-2 flex items-start gap-2">
            <svg className="w-4 h-4 text-slate-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <div className="w-full">
              <span className="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">存置地點</span>
              <div className="text-sm flex justify-between border-b border-slate-800/50 pb-1 mb-1">
                <span className="text-slate-500 shrink-0">標單：</span>
                <span className="text-slate-300 text-right">{item.location || "—"}</span>
              </div>
              <div className="text-sm flex justify-between">
                <span className="text-slate-500 shrink-0">清冊：</span>
                <span className={isLocDiff ? "text-red-500 font-bold text-right" : "text-slate-400 text-right"}>
                  {item.inventory_loc || "—"}
                </span>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── Filter chip ─────────────────────────────────────────────────────────────
function Chip({ label, active, onClick }) {
  return (
    <button className={`filter-chip mono ${active ? 'active' : ''}`} onClick={onClick}>
      {label}
    </button>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [query,    setQuery]    = useState('');
  const [tpFilter, setTpFilter] = useState('ALL');     // ALL | TP4 | TP5
  const [orphanFilter, setOrphanFilter] = useState('ALL'); // ALL | DIFF | TP_ONLY | CONTRACT_ONLY

  const isDefault = query === '' && tpFilter === 'ALL' && orphanFilter === 'ALL';

  const handleInput = useCallback((e) => setQuery(e.target.value), []);

  const q = useMemo(() => normalizeQuery(query), [query]);

  const filtered = useMemo(() => {
    return RAW_DATA.filter(item => {
      if (tpFilter !== 'ALL' && item.tp !== tpFilter) return false;
      if (orphanFilter === 'DIFF'          && !item.qty_diff)               return false;
      if (orphanFilter === 'TP_ONLY'       && item.orphan !== 'TP_ONLY')    return false;
      if (orphanFilter === 'CONTRACT_ONLY' && item.orphan !== 'CONTRACT_ONLY') return false;
      if (q && !matchItem(item, q)) return false;
      return true;
    });
  }, [q, tpFilter, orphanFilter]);

  const stats = useMemo(() => ({
    total:         RAW_DATA.length,
    shown:         filtered.length,
    diffCount:     RAW_DATA.filter(x => x.qty_diff).length,
    orphanTpCount: RAW_DATA.filter(x => x.orphan === 'TP_ONLY').length,
    orphanCCount:  RAW_DATA.filter(x => x.orphan === 'CONTRACT_ONLY').length,
  }), [filtered]);

  return (
    <div className="max-w-2xl mx-auto px-4 pt-10">
      {/* ── Header ── */}
      <header className="text-center mb-8">
        <div className="mono text-[10px] text-slate-700 tracking-widest mb-3">TPAC EQUIPMENT QUERY SYSTEM v3.0</div>
        <h1 className="text-xl font-bold tracking-widest text-slate-300 mb-1">設備選用清單 × 標單比對查詢</h1>
        <p className="text-xs text-slate-700">資料來源：TP4/TP5 設備選用清單 20190823 ＋ 標單計價明細表</p>
      </header>

      {/* ── Search input ── */}
      <div className="relative mb-4">
        <input
          type="text"
          value={query}
          onChange={handleInput}
          placeholder="搜尋編碼、名稱、型號、PM代號、財產編號、存置地點…"
          className="w-full bg-[#0e1320] border border-[#1c2235] focus:border-indigo-600 rounded-xl py-4 pl-5 pr-20 text-white text-sm transition-colors placeholder-[#252a40] shadow-2xl"
        />
        <span className="absolute right-4 top-1/2 -translate-y-1/2 mono text-xs text-slate-600">
          {filtered.length} hits
        </span>
      </div>

      {/* ── TP Filter tabs ── */}
      <div className="flex gap-1 mb-3 border-b border-[#1a1f35]">
        {['ALL','TP4','TP5'].map(tp => (
          <button
            key={tp}
            onClick={() => setTpFilter(tp)}
            className={`py-2 px-4 text-xs mono font-semibold transition-colors ${tpFilter===tp ? 'tab-active' : 'tab-inactive'}`}
          >
            {tp === 'ALL' ? '全部' : tp}
          </button>
        ))}
      </div>

      {/* ── Anomaly filter chips ── */}
      <div className="flex flex-wrap gap-2 mb-5 py-1">
        <Chip label="全部"       active={orphanFilter==='ALL'}            onClick={()=>setOrphanFilter('ALL')} />
        <Chip label="⚠ 數量差異" active={orphanFilter==='DIFF'}           onClick={()=>setOrphanFilter('DIFF')} />
        <Chip label="TP清單專屬"  active={orphanFilter==='TP_ONLY'}        onClick={()=>setOrphanFilter('TP_ONLY')} />
        <Chip label="標單專屬"    active={orphanFilter==='CONTRACT_ONLY'}  onClick={()=>setOrphanFilter('CONTRACT_ONLY')} />
      </div>

      {/* ── Stats ── */}
      <StatsBar {...stats} shown={filtered.length} />

      {/* ── Legend ── */}
      {!isDefault && (
      <div className="flex flex-wrap gap-3 text-[10px] mb-5 px-1">
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-amber-500/20 border-l-2 border-amber-500 inline-block"/><span className="text-slate-600">數量差異</span></span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-violet-500/20 border-l-2 border-violet-500 inline-block"/><span className="text-slate-600">TP清單專屬（標單無此項）</span></span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-emerald-500/20 border-l-2 border-emerald-500 inline-block"/><span className="text-slate-600">標單專屬（TP清單無此項）</span></span>
      </div>
      )}

      {/* ── Results ── */}
      {!isDefault && (
      <div className="space-y-3">
        {filtered.length > 0 ? (
          filtered.map((item, idx) => (
            <ResultCard key={`${item.tp}-${item.code}-${idx}`} item={item} />
          ))
        ) : (
          <div className="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" opacity="0.3">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p className="mt-4 text-sm">
              {query ? `查無「${query}」的相關設備` : '目前篩選條件無結果'}
            </p>
            <p className="text-xs mt-1 opacity-60">請嘗試更換關鍵字或調整篩選條件</p>
          </div>
        )}
      </div>
      )}

      <footer className="mt-16 text-center mono text-[10px] text-[#1c2235] tracking-widest">
        TPAC EQUIPMENT AUDIT SYSTEM // TP4+TP5 × 標單計價明細表 // BUILDLESS ARCHITECTURE v3.0
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
